services:
  postgres:
    image: postgres:17
    container_name: coldwar-postgres
    environment:
      POSTGRES_DB: coldwarhistory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coldwarhistory"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: src/Tools/ColdWarHistory.DatabaseMigrator/Dockerfile
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=coldwarhistory;Username=postgres;Password=postgres
      MIGRATOR__Mode: up
      MIGRATOR__Services: auth,content,game,progress
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
